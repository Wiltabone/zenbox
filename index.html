<!DOCTYPE html>
<head>
	<title>The Reflective Zen Box | by Wilbert Tabone & Thijs Prakken | 2026</title>

	<!-- include the amazing hydra-synth by Olivia Jack -->
	<script src="./node_modules/hydra-synth/dist/hydra-synth.js"></script>
	<!-- socket.io for communication between browser and device -->
	<script src="./node_modules/socket.io/client-dist/socket.io.min.js"></script>

	<style>
		@import url('./fonts/UbuntuMono-Regular.ttf');

		/* The style of the page body */
		html, body {
			font-family: 'Ubuntu Mono', monospace;
			font-size: 1.7vw;
			line-height: 1.4;
			width: 100%;
			height: 100%;
			margin: 0px;
			overflow: hidden;
		}

		/* style for the code sections */
		div {
			display:table; 
			column-count:2; 
			width: 100%;
			height: 50%;
		}

		p {
			padding: 5%;
			width: 50%;
			height: 100%;
			border: 0;
			display: table-cell;
		}
		
		/* highlight the code for visibility*/
		mark {
			background-color: black;
			color: white;
			/* background-color: magenta; */
			/* color: cyan; */
			/* mix-blend-mode: difference; */
		}

		.canvas {
			z-index: -1000;
			position: fixed;
		}
	</style>
</head>
<body>
	<!-- the visual canvas -->
	<canvas id="hydra-canvas" class="canvas"></canvas>
	<!-- the 3 code sections overlaying the canvas -->
	<div>
		<p id="o0"></p>
	</div>

	<!-- the script with all the core of the installation -->
	<script>
		window.onload = () => {
			// adjust the resolution here in pixels
			// suggested resolutions:
			// Modern computer: 1280 x 720 or 1920 x 1080
			// RPi5: 480 x 270 at least (but haven't tried higher)
			// RPi4: 480 x 270
			// RPi2 & 3: 160 x 90
			// const pixels = { width: 128, height: 72 };
			const pixels = { width: 480, height: 270 };

			// the resolution of the adc from the microcontroller
			// for Arduino use 1024, for 10-bit (like ESP) use 4096
			const adcRes = 4096;

			// aliases for JS functions
			let sin = Math.sin;
			let cos = Math.cos;
			let int = Math.floor;
			let pi2 = Math.PI;
			let rand = Math.random;

			// canvas setup for the hydra visuals
			let canvas = document.getElementById('hydra-canvas');
			canvas.width = window.innerWidth;
			canvas.height = window.innerHeight;
			canvas.style.width = '100%';
			canvas.style.height = '100%';
			// pixelated removes interpolation between pixels to 
			// reduce processing power on the RPi
			canvas.style.imageRendering = 'smooth'; //was 'pixelated'

			// create a new hydra instance
			var hydra = new Hydra({ 
				canvas: canvas,
				precision: 'lowp',
				detectAudio: false,
			});

			// set resolution for the visuals
			setResolution(pixels.width, pixels.height);

			// initialize solid black screens
			solid().out(o0);
			
			// storage for incoming parameters from controller
			// let c1 = { value: 0, function: -1, switch: 0, sound: null };
			// let c2 = { value: 0, function: -1, switch: 0, sound: null };

			
			// ─── State object ──────────────────────────────────────────────
			// All continuous values normalised 0–1 at parse time.
			// Switches and buttons kept as integers.
			let ctrl = {
				dial1:   0.5,   // main frequency/scale
				dial2:   0.5,   // colour dimension
				dial3:   0.3,   // modulation amount

				slider1: 0.2,   // speed/time
				slider2: 0.5,   // geometry/size
				slider3: 0.5,   // blend amount
				slider4: 0.3,   // secondary freq/noise

				switch2_1: 1,   // feedback on/off
				switch2_2: 0,   // colour invert
				switch2_3: 0,   // mirror axis

				switch3_1: 0,   // snippet selector (0,1,2 → maps to snippet index)
				switch3_2: 0,   // blend mode (0=add, 1=diff, 2=mult)

				button1: 0,     // randomise
				button2: 0,     // freeze
				button3: 0,     // reset
			};


		// current snippet index, separate from ctrl so we can 
		// detect changes and only re-eval when it actually changes
		let currentSnippet = -1;

		// ─── OSC → state mapping ───────────────────────────────────────
		const controlMap = {
			'/dial/1':     (v) => { ctrl.dial1   = v / adcRes; },
			'/dial/2':     (v) => { ctrl.dial2   = v / adcRes; },
			'/dial/3':     (v) => { ctrl.dial3   = v / adcRes; },

			'/slider/1':   (v) => { ctrl.slider1 = v / adcRes; },
			'/slider/2':   (v) => { ctrl.slider2 = v / adcRes; },
			'/slider/3':   (v) => { ctrl.slider3 = v / adcRes; },
			'/slider/4':   (v) => { ctrl.slider4 = v / adcRes; },

			'/2way/1':  (v) => { ctrl.switch2_1 = v; },
			'/2way/2':  (v) => { ctrl.switch2_2 = v; if (currentSnippet >= 0) visual(currentSnippet, 'o0'); },
			'/2way/3':  (v) => { ctrl.switch2_3 = v; if (currentSnippet >= 0) visual(currentSnippet, 'o0'); },

			'/3way/1':  (v) => { ctrl.switch3_1 = v; if (currentSnippet >= 0) visual(currentSnippet, 'o0'); },
			'/3way/2':  (v) => { ctrl.switch3_2 = v; if (currentSnippet >= 0) visual(currentSnippet, 'o0'); },

			'/button/1':   (v) => {
			if (v === 1) {
				let snippets = Object.keys(codeSnippets);
				currentSnippet = (currentSnippet + 1) % snippets.length;
				console.log('snippet:', snippets[currentSnippet]);
				visual(currentSnippet, 'o0');
			}
			},
			'/button/2':   (v) => {
			// hold to freeze: button down sets speed 0, release restores
			ctrl.button2 = v;
			},
			'/button/3':   (v) => {
			if (v === 1) randomiseControls();
			// if (v === 1) {
			// 	solid().out(o0);
			// 	displayCode('solid().out(o0)', 'o0');
			// 	currentSnippet = -1;
			// }
			console.log('hello');
			},
		};

		// ─── Helper: which snippet to show ────────────────────────────
		// switch3_1 (0,1,2) selects a bank of 3 snippets.
		// You can extend this when you add more snippets.
		function snippetIndexFromSwitches() {
			return ctrl.switch3_1; // 0, 1, or 2
			// To use all 8 snippets across both 3-way switches combined:
			// return ctrl.switch3_1 * 3 + ctrl.switch3_2;
		}

		// ─── Socket.io ────────────────────────────────────────────────
		let socket = io();

		socket.on('message', (...msg) => {
		// resetTimer();
		const [address, value] = msg;
		if (controlMap[address]) {
			controlMap[address](value);
		}
		});

		// ─── Randomise all continuous controls ────────────────────────
		function randomiseControls() {
			ctrl.dial1   = rand();
			ctrl.dial2   = rand();
			ctrl.dial3   = rand();
			ctrl.slider1 = rand();
			ctrl.slider2 = rand();
			ctrl.slider3 = rand();
			ctrl.slider4 = rand();
		}


		// ─── Visual snippets ──────────────────────────────────────────
	// Each snippet is a function that returns a Hydra code string.
	// All ctrl properties are referenced as 'ctrl.xxx' strings so
	// that Hydra's lambda callbacks stay live on every frame.
	//
	// Controls used consistently across snippets:
	//   dial1   → primary freq / scale of main source
	//   dial2   → colour / hue dimension  
	//   dial3   → modulation / warp amount
	//   slider1 → speed / scroll rate
	//   slider2 → geometry size / scale factor
	//   slider3 → feedback / blend amount
	//   slider4 → secondary freq / noise density
	//   switch2_1 → feedback layer on/off
	//   switch2_2 → invert colours
	//   switch2_3 → mirror / symmetry axis
	//   switch3_2 → blend mode (0=add, 1=diff, 2=mult)

	let codeSnippets = {

	// ── 0: squiggle (original, extended) ────────────────────────
	'squiggle': (o) =>
	`solid().add(gradient(0)
		.hue(() => cos(ctrl.dial2 * pi2 * 3))
		.mask(shape(8, () => ctrl.slider2 * 0.5 + 0.1, 0.3)
		.scale(() => ctrl.dial1 * 3 + 1, () => ctrl.slider2 * 0.4 + 0.1))
		.rotate(0, () => (ctrl.button2 ? 0 : ctrl.slider1 * 0.3 - 0.15))
		.modulate(
		noise(() => sin(ctrl.dial1 * pi2) + 2.1, () => ctrl.slider4 * 0.5),
		() => ctrl.dial3 * 0.8 + 0.1)
		.${blendMode()}(
		src(o0).scale(1.02),
		() => ctrl.switch2_1 ? ctrl.slider3 * 0.95 : 0)
		${mirrorLayer()}${invertLayer()}${postProcess()})
	.out(${o})`,

	// ── 1: mosaic (original, extended) ──────────────────────────
    'mosaic': (o) =>
      `osc(() => ctrl.dial1 * 20 + 2, () => ctrl.button2 ? 0 : ctrl.slider1 * 0.4 - 0.2,
            () => ctrl.dial2 * 2 + 1.7)
        .kaleid(() => int(ctrl.slider2 * 6) + 2)
        .colorama(() => cos(ctrl.dial2 * pi2 * 6) * 0.1 + 0.1)
        .modulatePixelate(
          voronoi(() => ctrl.slider4 * 10 + 2, 0.15, 0),
          () => sin(ctrl.dial3 * pi2 * 4) * 10 + 11)
        ${mirrorLayer()}${invertLayer()}${postProcess()}
      .out(${o})`,

	  // ── 2: smear (original, extended) ───────────────────────────
	  'smear': (o) =>
      `src(o0)
        .modulate(
          voronoi(() => ctrl.slider4 * 15 + 5, 0.1, 0),
          () => cos(ctrl.dial3 * 8 * pi2) * 0.025)
        .hue(() => sin(ctrl.dial2 * 4 * pi2) * 0.005)
        .scroll(
          () => ctrl.switch2_3 ? ctrl.slider1 * 0.02 - 0.01 : 0,
          () => ctrl.switch2_3 ? 0 : ctrl.slider1 * 0.02 - 0.01)
        .diff(solid(0, () => ctrl.dial1 * 0.8, () => ctrl.slider2 * 0.9)
          .mask(noise(() => ctrl.slider4 * 3 + 1, 0.2).thresh(0.5, 0)))
        ${invertLayer()}${postProcess()}
      .out(${o})`,

	  // ── 3: glass (original, extended) ───────────────────────────
	  'glass': (o) =>
      `osc(() => ctrl.dial1 * 15 + 5,
            () => ctrl.button2 ? 0 : ctrl.slider1 * 0.6 - 0.3)
        .color(0, () => cos(ctrl.dial2 * pi2 * 3), 1)
        .modulateKaleid(
          shape(() => int(ctrl.slider2 * 4) + 2, 0.2,
                () => sin(ctrl.dial3 * pi2 * 9) * 0.5 + 0.5)
            .repeat(
              () => ctrl.switch2_3 ? 11 : 3,
              () => ctrl.switch2_3 ? 3 : 11),
          () => int(ctrl.slider4 * 8) + 2)
        .colorama(() => ctrl.dial2 * 0.6 + 0.1)
        .saturate(() => ctrl.slider3 * 6 + 1)
        ${invertLayer()}${postProcess()}
      .out(${o})`,

	  // ── 4: paint (original, extended) ───────────────────────────
	  'paint': (o) =>
      `noise(() => cos(ctrl.dial1 * pi2 * 5) * 0.2 + 0.3,
              () => ctrl.button2 ? 0 : ctrl.slider1 * 0.1)
        .colorama(() => ctrl.dial2 * 0.01 + 6)
        .hue(() => sin(ctrl.dial2 * pi2) * -0.3)
        .modulate(
          noise(() => cos(ctrl.dial3 * pi2 * 2) * 2 + 4,
                () => ctrl.slider4 * 0.2))
        .${blendMode()}(
          src(o0).scale(() => ctrl.slider2 * 0.1 + 0.95),
          () => ctrl.switch2_1 ? ctrl.slider3 * 0.6 : 0)
        ${mirrorLayer()}${invertLayer()}${postProcess()}
      .out(${o})`,


    // ── 5: tunnel ───────────────────────────────────────────────
    // Zooming concentric rings that warp with voronoi
    'tunnel': (o) =>
      `osc(() => ctrl.dial1 * 30 + 5,
            () => ctrl.button2 ? 0 : ctrl.slider1 * 0.5 - 0.25,
            () => ctrl.dial2 * pi2)
        .modulateScale(
          osc(() => ctrl.slider4 * 10 + 2).rotate(() => ctrl.slider2 * pi2),
          () => ctrl.dial3 * 0.4 + 0.05)
        .colorama(() => ctrl.dial2 * 0.3 + 0.05)
        .rotate(0, () => ctrl.button2 ? 0 : ctrl.slider1 * 0.1 - 0.05)
        .${blendMode()}(
          src(o0).scale(() => 1 + ctrl.slider3 * 0.04),
          () => ctrl.switch2_1 ? 0.85 : 0)
        ${mirrorLayer()}${invertLayer()}${postProcess()}
      .out(${o})`,

	  // ── 6: ripple ───────────────────────────────────────────────
    // Scrolling gradient distorted by noise, creates water-like surface
    'ripple': (o) =>
      `gradient(() => ctrl.dial1 * 4)
        .modulateScrollX(
          noise(() => ctrl.slider4 * 6 + 1,
                () => ctrl.button2 ? 0 : ctrl.slider1 * 0.3),
          () => ctrl.dial3 * 0.3 + 0.02)
        .modulateScrollY(
          noise(() => ctrl.slider4 * 6 + 1,
                () => ctrl.button2 ? 0 : ctrl.slider1 * 0.3),
          () => ctrl.dial3 * 0.3 + 0.02)
        .hue(() => ctrl.dial2 * 0.5)
        .saturate(() => ctrl.slider2 * 3 + 1)
        .${blendMode()}(
          src(o0),
          () => ctrl.switch2_1 ? ctrl.slider3 * 0.7 : 0)
        ${mirrorLayer()}${invertLayer()}${postProcess()}
      .out(${o})`,

	  // ── 7: fracture ─────────────────────────────────────────────
    // Voronoi cells with sharp colour banding, switch3_2 changes 
    // the blend creating stained-glass vs x-ray aesthetic
    'fracture': (o) =>
      `voronoi(() => ctrl.dial1 * 10 + 2,
               () => ctrl.button2 ? 0 : ctrl.slider1 * 0.5,
               () => ctrl.dial3 * 5)
        .colorama(() => ctrl.dial2 * 0.4 + 0.05)
        .kaleid(() => int(ctrl.slider2 * 5) + 2)
        .modulateRotate(
          src(o0),
          () => ctrl.dial3 * 0.3)
        .saturate(() => ctrl.slider4 * 4 + 1)
        .${blendMode()}(
          src(o0).scale(1.01).hue(() => ctrl.dial2 * 0.02),
          () => ctrl.switch2_1 ? ctrl.slider3 * 0.8 : 0)
        ${mirrorLayer()}${invertLayer()}${postProcess()}
      .out(${o})`,
  };

	// ─── Blend mode helper ────────────────────────────────────────
	// switch3_2: 0=add, 1=diff, 2=mult
	function blendMode() {
		const modes = ['add', 'diff', 'mult'];
		return modes[ctrl.switch3_2] || 'add';
	}

	// ─── Mirror helper ────────────────────────────────────────────
	// switch2_3: 2-fold kaleid = horizontal mirror; triggers re-eval via controlMap
	function mirrorLayer() {
		return ctrl.switch2_3 ? '.kaleid(2)' : '';
	}

	// ─── Post-processing tier ─────────────────────────────────────
	// switch3_1: 0=raw, 1=pixelate, 2=posterize (high contrast)
	function postProcess() {
		if (ctrl.switch3_1 === 1) return '.pixelate(20, 20)';
		if (ctrl.switch3_1 === 2) return '.contrast(3).brightness(-0.1)';
		return '';
	}

	// ─── Colour invert helper ─────────────────────────────────────
	// switch2_2: appended to the chain when on
	function invertLayer() {
		return ctrl.switch2_2 ? '.invert(1)' : '';
	}

	// ─── Visual runner ────────────────────────────────────────────
	function visual(idx, out) {
		let snippets = Object.keys(codeSnippets);
		// clamp index to available snippets
		idx = Math.min(idx, snippets.length - 1);
		let code = codeSnippets[snippets[idx]](out);
		eval(code);
		//displayCode(code, out);
	}

	// load the first snippet on startup
	currentSnippet = 0;
	visual(0, 'o0');
}

// A timer that makes the code transparent when the 
			// installation is not used for a little while
			// let timer;
			// function resetTimer(){
			// 	// reset timer that turns of sound
			// 	clearTimeout(timer);
			// 	timer = setTimeout(() => {
			// 		document.getElementById('o0').style.opacity = 0.5;
			// 		// p.outputVolume(0.125, 1);
			// 	}, 5000);
			// 	// turn on volume if controller is touched
			// 	// p.outputVolume(0.7, 0.5);
			// 	document.getElementById('o0').style.opacity = 1;
			// }

			// Generate the new visual code
			function visual(ctl, out){
				// get the code from the list of options
				let snippets = Object.keys(codeSnippets);
				// apply the parameter value
				let code = codeSnippets[snippets[ctl.function]](out, 'ctl.value');
				// generate the visuals
				eval(code);
				// display the code also as text on the screen
				//displayCode(code, out);
			}

			// display the code as text on the screen
			function displayCode(text, element){
				let paragraph = document.getElementById(element);
				paragraph.innerHTML = '';
				let mark = document.createElement('mark');
				mark.innerText = text;
				paragraph.appendChild(mark);
			}
	</script>
</body>
</html>
